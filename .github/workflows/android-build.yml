name: Build Android APK from ZIP

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip poker_trainer_android_v17_final_stability.zip -d extracted
          find extracted -maxdepth 4 -type f | head -80

      - name: Find project folder
        run: |
          PROJECT_DIR=$(find extracted -name settings.gradle -type f -exec dirname {} \; | head -1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project folder is: $PROJECT_DIR"

      - name: Fix AndroidX settings
        run: |
          echo "android.useAndroidX=true" >> "$PROJECT_DIR/gradle.properties"
          echo "android.enableJetifier=true" >> "$PROJECT_DIR/gradle.properties"

      - name: Fix AppCompat theme
        run: |
          sed -i 's#android:style/Theme.Material.Light.NoActionBar#Theme.AppCompat.Light.NoActionBar#g' "$PROJECT_DIR/app/src/main/res/values/styles.xml"

      - name: Fix Java Kotlin target
        run: |
          cat >> "$PROJECT_DIR/app/build.gradle" <<'EOF'

          android {
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = "17"
              }
          }
          EOF

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: poker-trainer-debug-apk
          path: extracted/**/app/build/outputs/apk/debug/*.apk
